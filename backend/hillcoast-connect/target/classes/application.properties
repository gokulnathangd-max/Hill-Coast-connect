# 1. Force Spring to use the PostgreSQL Driver
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Dynamically construct your Aiven URL from your Render environment variables 
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
# 3. Database Credentials read directly from your Render panel
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# 4. Hibernate & JPA Configurations for PostgreSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true